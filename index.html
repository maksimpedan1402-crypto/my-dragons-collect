<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Коллекция Драконов</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .stats { margin-bottom: 15px; font-weight: bold; text-align: center; color: #27ae60; }
        .dragon-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .dragon-item:hover { background: #f9f9f9; }
        .dragon-item input { margin-right: 15px; transform: scale(1.2); cursor: pointer; }
        .dragon-item.checked { color: #888; text-decoration: line-through; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Dragon Collection</h1>
    
    <div class="stats" id="stats">Собрано: 0 из 0</div>
    
    <input type="text" id="search" class="search-box" placeholder="Поиск дракона...">
    
    <div id="dragonList">
        </div>
</div>

<script>
    // Ваш список (сокращенно для примера, добавьте остальные так же)
    const dragons = [
        "Cocovira", "Rocirus", "Atarix", "Saurium", "Tigrilia", "Tuskaryn", "Dexyn", "Geliklen", 
        "Palus", "Bizaltidath", "Magmip", "Numine", "Venu", "Alrenoth", "Glacegar", "Howler", 
        "Sylva", "Amphyll", "Enkylous", "Krekiz", "Coralina", "Taraka", "Agricos", "Dunvolth", 
        "Ferorex", "Khepera", "Bisonture", "Mother Dragon", "Taihoa", "Zeipera", "Neroxide", 
        "Radidon", "Venid", "Chronocus", "Rhyndac", "Soukeyi", "Zinthors", "Karukiri", 
        "Mistrasune", "Onagajin", "Suiikipon", "Yaruakura", "Veidreki", "Alatura", "Viridik", 
        "Stymelisk", "Fulong", "Rozora", "Ovicirus", "Tsukuizan", "Amaris", "Nakahaii", "Varana", 
        "Nor’gan", "Hoarusn", "Woodluma", "Eisendrache", "Aeroseys", "Yueshi", "Fernifex", "Vulpiruth", 
        "Makoura", "Lum Luenh", "Procaphan", "Chrysaloom", "Amoonita", "Tornedius", "Harvitius", "Astraeisis", 
        "Thorkonyx", "Hongliang", "Fleurianthus", "Cirquemaar", "Diraixos", "Quasaldrus", "Pagulau", "Iridesia", 
        "Trametos", "Tempiritus", "Mosuraki", "Gyngefared", "Arielisces", "Wuonghou", "Sunfloris", "Carnealgon", 
        "Tenebis", "Caelydris", "Pananisea", "Caunaris", "Calimaki", "Phyllantis", "Geordegourd", "Snoballista", 
        "Tronat", "Voltstorm", "Fueguin", "Malupentys", "Glaquacus", "Sentalius", "Allpehourn", "Ancient Skriffei", 
        "Skriffei", "Ancient Tosknir", "Tosknir", "Avefir", "Firifeller", "Hielochiim", "Nadaler", "Penguitus", 
        "Polairistel", "Stratalix", "Vyreas", "Yulereinn", "Tianma", "Cutiepatoo", "Desygual", "Fayrah", "Tarotta", 
        "Vulcoramor", "Lucklif", "Ancient Aranga", "Aranga", "Ayatrice", "Catruca", "Falugeis", "Gaulyra", "Mielebee", 
        "Skyrix", "Verscervus", "Yggdraten", "Cybernid", "Gundrakken", "Mechanoxide", "Motorouk", "Robodon", "Roborus X",
        "Xerthos", "Casirius", "Cosmalisk", "Cynphion-Noire", "Hexalios", "Lunaesol", "Quahtona", "Quetzaloctli", "Solarizon",
        "Volkumos", "Araneaix", "Cryptillow", "Djaevelhest", "Dratheros", "Dysuva", "Goliatomb", "Khorgeryn", "Nightmare Paranox",
        "Paranox", "Paukiki", "Scrawei", "Skelltor", "Aurutentia", "Avarakuma", "Bylendarach", "Gyrocopter", "Ignicaris", "Kikien", 
        "Ladonix", "Lumenigh", "Lyria", "Oroalas", "Paladianos", "Silvestratus", "Stellaris", "Taligris", "Tlacocun", "Seikarin", "Lepilon",
        "Geoteryx", "Smokgien", "Balgunyur", "Valkiero", "Constello", "Eryndiorn", "Guilmoros", "Moixaura", "Terruak", "Uheailes", "Xellatruce",
        "Atravanta", "Nyxavoid", "Syliru", "Featherfang", "Aethereus", "Corrupted Chronocus", "Kostragula", "Noctorius", "Ortarouk", "Impiavolo", 
        "Caudembris", "Goelica", "Khalknirik", "Verdrakor", "Source Dragon of Energy", "Source Dragon of Motion", "Riyu", "Mountain Dragon"
    ];
    ];
   

    const listContainer = document.getElementById('dragonList');
    const searchInput = document.getElementById('search');
    const statsContainer = document.getElementById('stats');

    // Загрузка данных из памяти браузера
    const savedData = JSON.parse(localStorage.getItem('dragonCollection')) || {};

    function updateStats() {
        const checkedCount = Object.values(savedData).filter(v => v).length;
        statsContainer.innerText = `Собрано: ${checkedCount} из ${dragons.length}`;
    }

    function renderList() {
        listContainer.innerHTML = '';
        dragons.forEach((name, index) => {
            const isChecked = savedData[name] || false;
            
            const div = document.createElement('div');
            div.className = `dragon-item ${isChecked ? 'checked' : ''}`;
            div.innerHTML = `
                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleDragon('${name}')">
                <span>${name}</span>
            `;
            listContainer.appendChild(div);
        });
        updateStats();
    }

    window.toggleDragon = (name) => {
        savedData[name] = !savedData[name];
        localStorage.setItem('dragonCollection', JSON.stringify(savedData));
        renderList();
    };

    // Поиск
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const items = document.querySelectorAll('.dragon-item');
        items.forEach(item => {
            const text = item.innerText.toLowerCase();
            item.classList.toggle('hidden', !text.includes(term));
        });
    });

    renderList();
</script>

</body>
</html>
